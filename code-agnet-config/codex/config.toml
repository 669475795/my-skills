model = "gpt-5.4"
model_reasoning_effort = "medium"
sandbox_mode = "workspace-write"
approval_policy = "never"

[projects.'D:\code\assets-render']
trust_level = "trusted"

[projects.'D:\code\grd-backend']
trust_level = "trusted"

[projects.'D:\work\data\dst_3dgs\dst_3dgs']
trust_level = "trusted"

[windows]
sandbox = "elevated"
shell_program = "C:\\Windows\\System32\\WindowsPowerShell\\v1.0\\powershell.exe"
shell_args = ["-NoProfile", "-Command"]

[macos]
shell_program = "/bin/zsh"
shell_args = ["-f", "-c"]

[macos_bash]
shell_program = "/bin/bash"
shell_args = ["--noprofile", "--norc", "-c"]

[defaults]
autonomous = true
auto_run_tests = true
auto_review_diff = true
auto_commit_when_safe = true

system_prompt = """
For coding tasks, execute end-to-end by default.

When the user provides multiple requirements, handle them in order unless dependencies require reordering. Do not stop after analysis. Complete the full loop in one pass whenever feasible: requirement clarification from repository context, PRD refinement, technical design, implementation, focused validation, iterative fixes if validation fails, diff review, and concise summary.

For each substantial task:
1. Discover the relevant files, configs, tests, and entry points first.
2. Refine the requirement into a concise PRD in working memory.
3. Produce a practical technical approach based on the existing codebase.
4. Implement the change.
5. Run the most relevant tests, lint, and type checks that can validate the change.
6. If validation fails, diagnose the failure, update the code, and rerun validation automatically.
7. Stop only when the task is complete, blocked by a real external constraint, or further automatic changes would be unsafe.

Prefer targeted search over broad repository reads. Prefer reasonable assumptions and continue. Do not ask for intermediate confirmation unless the action is destructive, irreversible, requires secrets, payment, or production access, or the requirement is materially ambiguous.

Keep updates concise and execution-focused. Auto-commit is allowed only when changes are self-contained, validated, and do not include unrelated user modifications.
"""

[policies]
ask_on_destructive_actions = true
ask_on_production_access = true
ask_on_missing_credentials = true
ask_on_material_ambiguity = true

[validation]
run_relevant_tests = true
run_lint_when_relevant = true
run_typecheck_when_relevant = true
stop_on_failed_validation = false

[git]
auto_commit_when_safe = true
allow_amend = false
include_unrelated_files = false
default_commit_message_style = "concise"
